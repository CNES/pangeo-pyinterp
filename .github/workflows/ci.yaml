name: CI

on:
  push:
    branches: "**"
  pull_request:
    branches: master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  geometry-stubs-sync:
    name: geometry-stubs-sync
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Check pyinterp/geometry stubs are in sync
      run: python scripts/generate_geometry_stubs.py --check

  coverage:
    name: coverage
    needs: geometry-stubs-sync
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Miniconda
      uses: mamba-org/setup-micromamba@v1
      with:
        cache-downloads: true
        condarc: |
          channels:
            - conda-forge
        create-args: |
          python=3.12
        environment-name: pyinterp
        environment-file: .github/environments/linux.yml
        init-shell: bash

    - name: Generate coverage data
      shell: bash -l {0}
      run: |
        ./scripts/generate_coverage.sh

    - name: Upload HTML report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: build/htmllcov

  linux:
    name: ${{ matrix.python-version }}-posix
    needs: geometry-stubs-sync
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        # Python 3.12 is used in all other jobs
        python-version: ['3.11', '3.13', '3.14']
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Miniconda
      uses: mamba-org/setup-micromamba@v1
      with:
        cache-downloads: true
        condarc: |
          channels:
            - conda-forge
        create-args: |
          python=${{ matrix.python-version }}
        environment-name: pyinterp
        environment-file: .github/environments/linux.yml
        init-shell: bash

    - name: Build extension
      shell: bash -l {0}
      run: |
        python setup.py build_ext
        python setup.py build

    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest -v -ra

  linux_arm64:
    name: ${{ matrix.python-version }}-arm64
    needs: geometry-stubs-sync
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true
    - name: Setup Miniconda
      uses: mamba-org/setup-micromamba@v1
      with:
        cache-downloads: true
        condarc: |
          channels:
            - conda-forge
        environment-name: pyinterp
        create-args: >-
          python=${{ matrix.python-version }}
          cmake
          cxx-compiler
          dask
          libboost-devel
          make
          numcodecs
          numpy
          pandas
          pip
          pytest
          setuptools
          xarray
        init-shell: bash
    - name: Build extension
      shell: bash -l {0}
      run: |
        python setup.py build_ext
        python setup.py build
    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest -v -ra

  macos:
    name: macos
    needs: geometry-stubs-sync
    runs-on: macos-latest
    timeout-minutes: 45
    # Serialize only the Pages deploy across runs (deploy steps below are
    # gated to refs/heads/master); tests still run in parallel on other refs.
    concurrency:
      group: pages-${{ github.ref }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 5

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
        fetch-tags: true

    - name: Setup Miniconda
      uses: mamba-org/setup-micromamba@v1
      with:
        cache-downloads: true
        condarc: |
          channels:
            - conda-forge
        create-args: |
          python=3.14
        environment-name: pyinterp
        environment-file: .github/environments/osx.yml
        init-shell: bash

    - name: Build extension
      shell: bash -l {0}
      run: |
        python setup.py build_ext
        python setup.py build

    - name: Run tests
      shell: bash -l {0}
      run: |
        pytest -v -ra

    - name: Generate Documentation
      shell: bash -l {0}
      run: |
        sphinx-build -b html docs/source docs/build

    - name: Setup Pages
      if: github.ref == 'refs/heads/master'
      uses: actions/configure-pages@v5

    - name: Upload artifact
      if: github.ref == 'refs/heads/master'
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs/build

    - name: Deploy to GitHub Pages
      if: github.ref == 'refs/heads/master'
      id: deployment
      uses: actions/deploy-pages@v4

  win:
    name: win
    needs: geometry-stubs-sync
    runs-on: windows-2025
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Miniconda
      uses: mamba-org/setup-micromamba@v1
      with:
        cache-downloads: true
        condarc: |
          channels:
            - conda-forge
        create-args: |
          python=3.14
        environment-name: pyinterp
        environment-file: .github/environments/win.yml

    # The windows-2025 image now ships Visual Studio 18 (2026), so the pinned
    # "Visual Studio 17 2022" CMake generator no longer finds an instance.
    # Activate the MSVC developer environment (cl.exe + Ninja on PATH) and build
    # with the version-independent Ninja generator instead (see CMAKE_GEN).
    - name: Set up MSVC toolchain
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Building Testing Python Package
      shell: bash -l {0}
      env:
        CMAKE_GEN: Ninja
      run: |
        # Convert the backslashes in $CONDA_PREFIX to forward slashes; otherwise
        # they are stripped when the argument is forwarded to CMake.
        python setup.py build_ext --cmake-args="-DBoost_INCLUDE_DIRS=${CONDA_PREFIX//\\//}/Library/include"
        python setup.py build
        pytest -v -ra
