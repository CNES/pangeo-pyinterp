name: Build and publish wheels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # Linux x86_64 (manylinux)
          - ubuntu-24.04-arm    # Linux aarch64 (manylinux)
          - macos-13            # macOS Intel x86_64
          - macos-latest        # macOS ARM arm64
          - windows-2025        # Windows x86_64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true

      # Boost 1.90+ headers are required on all platforms.
      # Linux: handled inside the manylinux container via before-all (pyproject.toml).
      # macOS: handled via brew in before-all (pyproject.toml).
      # Windows: micromamba is set up here (same toolchain as the CI workflow)
      #          so the conda prefix is available before cibuildwheel runs.
      - name: Install Boost headers (Windows)
        if: runner.os == 'Windows'
        uses: mamba-org/setup-micromamba@v1
        with:
          cache-downloads: true
          condarc: |
            channels:
              - conda-forge
          create-args: "libboost-headers>=1.90"
          environment-name: boost-deps
          generate-run-shell: false
          init-shell: none

      - name: Export Boost prefix to GITHUB_ENV (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "BOOST_PREFIX=$MAMBA_ROOT_PREFIX/envs/boost-deps/Library" \
            >> "$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          # Windows: point CMake at the conda-forge Boost headers
          CIBW_ENVIRONMENT_WINDOWS: >-
            CMAKE_PREFIX_PATH="${{ env.BOOST_PREFIX }}"
          # Sanity-check every built wheel imports and exposes its version.
          CIBW_TEST_COMMAND: >-
            python -c "import pyinterp; print(pyinterp.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  # Pre-release tags (e.g. v1.2.3rc1, v1.2.3.dev1, v1.2.3a1, v1.2.3b1) go to
  # TestPyPI; plain stable tags (vX.Y.Z) go to real PyPI.
  detect-target:
    name: Detect publish target
    needs: build_wheels
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - id: check
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          fi

  publish-testpypi:
    name: Publish wheels to TestPyPI
    needs: detect-target
    if: needs.detect-target.outputs.prerelease == 'true'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/pyinterp
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish wheels to PyPI
    needs: detect-target
    if: needs.detect-target.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pyinterp
    permissions:
      id-token: write   # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
